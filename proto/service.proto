syntax = "proto3";
option go_package = "./proto";

service FaultTolerant {
  rpc Execute(Request) returns (Response);
  rpc Stream(Request) returns (stream Response);
  rpc Promote(PromoteRequest) returns (PromoteResponse);
  rpc UpdateLeader(UpdateLeaderRequest) returns (UpdateLeaderResponse);
}

message UpdateLeaderRequest {
    string new_leader_addr = 1;
}
message UpdateLeaderResponse {}

message PromoteRequest {}
message PromoteResponse {}

message Request {
  string id = 1;
  string payload = 2;
}

message Response {
  string id = 1;
  string result = 2;
  string leader_addr = 3; // for redirect, if necessary
}